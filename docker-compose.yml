services:
  postgres:
    image: postgres:16-alpine
    container_name: gestor-blockchain-postgres
    restart: unless-stopped
    ports:
      - '55432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestor_blockchain_dev
    command:
      - "postgres"
      - "-c"
      - "password_encryption=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gestor_blockchain_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
